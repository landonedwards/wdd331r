<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quote-card">
        <div class="quote-card__quote">
            <p>“Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.”</p>
            <p class="quote-card__quote-author">― Albert Einstein</p>
        </div>
        <div class="quote-card__author-image">
            <img src="albert.jpg" alt="Albert Einstein" />
        </div>
    </div>
    <div class="dark-section">
        <div class="quote-card">
            <div class="quote-card__quote">
                <p>“Be the change that you wish to see in the world.”</p>
                <p class="quote-card__quote-author">― Mahatma Gandhi</p>
            </div>
            <div class="quote-card__author-image">
                <img src="gandhi.jpg" alt="Mahatma Gandhi" />
            </div>
        </div>
    </div>
</body>
</html>
